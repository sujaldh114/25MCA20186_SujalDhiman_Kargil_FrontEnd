<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart to-do manager</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="script.js" defer></script>
    
    <style>
        body {
            background-color: #fefefe;
        }
        .container {
            margin-top: 50px;
        }
        .completed{
            text-decoration: line-through;
            color: gray;
        }
        .overdue {
            border: 2px solid red;
            background-color: #ffe6e6;
        }
    </style>
</head>


<body class="bg-light">
    
    <div class="container mt-5">
        <h2 class="text-center mb-4">Smart To-Do Manager</h2>
        
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" id="taskInput" class="form-control" placeholder="Task Name">
            </div>
            <div class="col-md-3">
                <select id="priorityInput" class="form-select">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            
            <div class="col-md-3">
                <input type="date" id="dueDateInput" class="form-control">
            </div>
            <div class="col-md-2">
                <button onclick="addTask()" class="btn btn-primary w-100">Add Task</button>
            </div>
        </div>
        
        <div class="mt-3">
            <button onclick="filterTasks('all')" class="btn btn-secondary">All</button>
            <button onclick="filterTasks('completed')" class="btn btn-success">Completed</button>
            <button onclick="filterTasks('pending')" class="btn btn-warning">Pending</button>
        </div>
        
        
        <div class="mt-3">
            <button onclick="sortPriority()" class="btn btn-dark">Sort by Priority</button>
            <button onclick="sortDeadline()" class="btn btn-info">Sort by Due Date</button>
        </div>
        
        <div class="mt-3">
            <p>Total: <span id="total">0</span></p>
            <p>Completed: <span id="completed">0</span></p>
        <p>Pending: <span id="pending">0</span></p>
        </div>
    
    <div id="taskList" class="mt-3"></div>
    </div>

</body>
</html>
